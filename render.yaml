services:
  - type: web
    name: atome-chatbot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atome-chatbot-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: DEFAULT_KB_URL
        value: https://help.atome.ph/hc/en-gb/categories/4439682039065-Atome-Card
      - key: AUTO_SYNC_DEFAULT_AGENT
        value: "false"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "20"

databases:
  - name: atome-chatbot-db
    databaseName: atome_chatbot
    user: atome_chatbot
    plan: free
    ipAllowList: []
